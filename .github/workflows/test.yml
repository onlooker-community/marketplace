permissions:
  contents: read
jobs:
  test:
    env:
      FORCE_COLOR: '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - uses: ./.github/actions/prepare
      - name: Install jq
        run: sudo apt-get install -y jq
      - run: bun test --bail
name: Test
on: [push, pull_request]
