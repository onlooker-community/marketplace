site_name: onlooker (dev docs)
site_description: >-
  Developer documentation for the onlooker-community/marketplace monorepo:
  Claude Code plugins, layout, and contribution workflow.
repo_url: https://github.com/onlooker-community/marketplace
edit_uri: edit/main/docs/docs/

theme:
  name: readthedocs

nav:
